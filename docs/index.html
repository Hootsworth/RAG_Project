<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conversation RAG Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="sw-root">
      <header class="sw-header">
        <div>
          <div class="sw-kicker">RAG SYSTEM — GITHUB PAGES</div>
          <h1>CONVERSATION<br>ARCHIVE</h1>
        </div>
        <div class="sw-header-meta">
          <span>RENDER API</span>
          <strong>LIVE</strong>
        </div>
      </header>

      <nav class="sw-nav" aria-label="Project sections">
        <a class="sw-nav-item sw-nav-active" href="#chat">Ask</a>
        <a class="sw-nav-item" href="#evidence">Evidence</a>
        <a class="sw-nav-item" href="https://github.com/Hootsworth/RAG_Project" target="_blank" rel="noreferrer">Repo</a>
      </nav>

      <section class="toolbar">
        <label for="api-url">Backend endpoint</label>
        <div class="api-row">
          <input id="api-url" value="https://rag-project-bufn.onrender.com">
          <button id="save-api" type="button">Save</button>
        </div>
      </section>

      <section id="chat" class="chat">
        <div id="messages" class="messages">
          <article class="bubble bot">
            ASK THE ARCHIVE. TOPICS, HABITS, PERSONA, SPEECH PATTERN.
          </article>
        </div>
        <form id="ask-form" class="ask-form">
          <input id="question" autocomplete="off" placeholder="What kind of person is this user?" required>
          <button type="submit">Ask</button>
        </form>
      </section>

      <section id="evidence" class="evidence">
        <div class="sw-kicker">Retrieved context</div>
        <h2>CHECKPOINTS / CHUNKS</h2>
        <div id="evidence-list">Evidence appears after a query.</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
